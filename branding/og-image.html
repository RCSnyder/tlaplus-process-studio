<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 630px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto,
          sans-serif;
        background: #0d1117;
        color: #e6edf3;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 80px 90px;
        position: relative;
        overflow: hidden;
      }

      /* Subtle grid pattern */
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(88, 166, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(88, 166, 255, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* Accent glow */
      body::after {
        content: "";
        position: absolute;
        top: -120px;
        right: -80px;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(88, 166, 255, 0.12) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .content {
        position: relative;
        z-index: 1;
      }

      .eyebrow {
        font-size: 16px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2.5px;
        color: #58a6ff;
        margin-bottom: 20px;
      }

      .title {
        font-size: 72px;
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -1.5px;
        margin-bottom: 28px;
      }
      .title .accent {
        color: #58a6ff;
      }

      .subtitle {
        font-size: 26px;
        font-weight: 400;
        color: #8b949e;
        line-height: 1.45;
        max-width: 800px;
      }

      .footer {
        position: absolute;
        bottom: 50px;
        left: 90px;
        right: 90px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 18px;
        border-radius: 8px;
        border: 1px solid #30363d;
        background: #161b22;
        font-size: 15px;
        font-weight: 600;
        color: #8b949e;
      }
      .badge .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #3fb950;
      }

      .url {
        font-size: 18px;
        font-weight: 600;
        color: #58a6ff;
        letter-spacing: 0.3px;
      }

      /* State machine illustration */
      .diagram {
        position: absolute;
        right: 70px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 1;
        opacity: 0.18;
      }
      .diagram svg {
        width: 320px;
        height: 320px;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <div class="eyebrow">
        Open Source &middot; Client-Side &middot; Zero Server
      </div>
      <h1 class="title">
        TLA+ <span class="accent">Process</span><br />Studio
      </h1>
      <p class="subtitle">
        Model any business process as a state machine.<br />Collect feedback.
        Iterate with any LLM.
      </p>
    </div>

    <div class="diagram">
      <svg viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- State nodes -->
        <circle
          cx="160"
          cy="50"
          r="30"
          stroke="#58a6ff"
          stroke-width="2.5"
          fill="none"
        />
        <circle
          cx="60"
          cy="170"
          r="30"
          stroke="#58a6ff"
          stroke-width="2.5"
          fill="none"
        />
        <circle
          cx="260"
          cy="170"
          r="30"
          stroke="#58a6ff"
          stroke-width="2.5"
          fill="none"
        />
        <circle
          cx="160"
          cy="270"
          r="30"
          stroke="#58a6ff"
          stroke-width="2.5"
          fill="none"
        />
        <!-- Transition arrows -->
        <line
          x1="138"
          y1="72"
          x2="82"
          y2="148"
          stroke="#58a6ff"
          stroke-width="2"
        />
        <line
          x1="182"
          y1="72"
          x2="238"
          y2="148"
          stroke="#58a6ff"
          stroke-width="2"
        />
        <line
          x1="60"
          y1="200"
          x2="138"
          y2="250"
          stroke="#58a6ff"
          stroke-width="2"
        />
        <line
          x1="260"
          y1="200"
          x2="182"
          y2="250"
          stroke="#58a6ff"
          stroke-width="2"
        />
        <line
          x1="90"
          y1="170"
          x2="230"
          y2="170"
          stroke="#58a6ff"
          stroke-width="1.5"
          stroke-dasharray="6 4"
        />
        <!-- Labels -->
        <text
          x="160"
          y="55"
          text-anchor="middle"
          fill="#58a6ff"
          font-size="14"
          font-weight="600"
        >
          Start
        </text>
        <text
          x="60"
          y="175"
          text-anchor="middle"
          fill="#58a6ff"
          font-size="14"
          font-weight="600"
        >
          Review
        </text>
        <text
          x="260"
          y="175"
          text-anchor="middle"
          fill="#58a6ff"
          font-size="14"
          font-weight="600"
        >
          Iterate
        </text>
        <text
          x="160"
          y="275"
          text-anchor="middle"
          fill="#58a6ff"
          font-size="14"
          font-weight="600"
        >
          Done
        </text>
      </svg>
    </div>

    <div class="footer">
      <span class="badge"
        ><span class="dot"></span> 100% client-side &middot; nothing leaves your
        browser</span
      >
      <span class="url">tlaplus-process-studio.com</span>
    </div>
  </body>
</html>

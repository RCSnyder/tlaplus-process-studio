<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- State machine: 3 nodes + arrows -->
  <circle cx="256" cy="140" r="48" stroke="#58a6ff" stroke-width="10" fill="none"/>
  <circle cx="140" cy="340" r="48" stroke="#58a6ff" stroke-width="10" fill="none"/>
  <circle cx="372" cy="340" r="48" stroke="#58a6ff" stroke-width="10" fill="none"/>
  <!-- Arrows -->
  <line x1="224" y1="176" x2="168" y2="304" stroke="#58a6ff" stroke-width="7" stroke-linecap="round"/>
  <line x1="288" y1="176" x2="344" y2="304" stroke="#58a6ff" stroke-width="7" stroke-linecap="round"/>
  <line x1="188" y1="340" x2="324" y2="340" stroke="#58a6ff" stroke-width="7" stroke-linecap="round"/>
  <!-- Arrow heads -->
  <polygon points="168,304 180,284 156,290" fill="#58a6ff"/>
  <polygon points="344,304 332,284 356,290" fill="#58a6ff"/>
  <polygon points="324,340 308,328 308,352" fill="#58a6ff"/>
  <!-- Center dot accent -->
  <circle cx="256" cy="140" r="12" fill="#58a6ff"/>
</svg>

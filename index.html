    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
      mermaid.initialize({ startOnLoad: false, securityLevel: "loose" })
      window.renderMermaid = async function (code) {
        const el = document.getElementById("mermaid-target")
        if (!el) return
        const dark = window.matchMedia("(prefers-color-scheme: dark)").matches
        mermaid.initialize({
          startOnLoad: false,
          theme: dark ? "dark" : "default",
          securityLevel: "loose"
        })
        try {
          // Remove previous render to avoid ID conflicts
          const old = document.getElementById("mermaid-graph")
          if (old) old.remove()
          const { svg } = await mermaid.render("mermaid-graph", code)
          el.innerHTML = svg
        } catch (e) {
          el.innerHTML =
            '<p style="color:var(--warn);padding:14px">Diagram error: ' +
            e.message +
            "</p>"
        }
      }
    </script>
  </head>
  <body>
    <!--
    AGENT-INSTRUCTIONS: TLA+ Process Studio — 100% client-side, zero server calls.

    READING STATE (most idiomatic approach):
      1. localStorage.getItem("tla_studio_source")           → raw TLA+ spec text
      2. JSON.parse(localStorage.getItem("tla_studio_comments") || "[]")
         → [{target:"StateName", author:"Name", text:"Comment"}, ...]
      3. document.querySelector(".editor-area").value         → current editor content

    WRITING STATE BACK:
      4. Set editor value:
         const ta = document.querySelector(".editor-area");
         const setter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype,'value').set;
         setter.call(ta, newSpec);
         ta.dispatchEvent(new Event('input',{bubbles:true}));
      5. Click parse: document.querySelector(".btn-primary").click()

    WORKFLOW: paste TLA+ → parse → review states (Model tab) → collect comments →
              export with iteration prompt (Tools tab) → LLM revises → paste back → repeat.

    UI STRUCTURE: Topbar (stats+privacy) | Left pane (source editor) | Right pane (Model/Reference/Tools tabs)
    PRIVACY: No server, no API, no analytics, no cookies. All data in localStorage only.
    -->
    <div id="app"></div>
  </body>
